name: Deploy Next.js site to Pages

on:
  workflow_run:
    workflows: ["Quality"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == github.event.repository.default_branch
        )
      }}
    permissions:
      contents: read
      pages: read
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out validated revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Configure Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.17.0
          cache: npm
      - name: Read Pages deployment metadata
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install locked dependencies
        run: npm ci
      - name: Build repository-aware static export
        env:
          BOOK_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build:static
      - name: Upload immutable Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: out

  deploy:
    name: Deploy Pages artifact
    needs: build
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Deploy validated artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Verify deployed root and search manifest
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          base_url="${PAGE_URL%/}/"
          curl --fail --silent --show-error --location \
            --retry 6 --retry-all-errors --retry-delay 5 --max-time 30 \
            --output /dev/null "${base_url}"
          curl --fail --silent --show-error --location \
            --retry 6 --retry-all-errors --retry-delay 5 --max-time 30 \
            --output /dev/null "${base_url}_book/search-index/index.json"
