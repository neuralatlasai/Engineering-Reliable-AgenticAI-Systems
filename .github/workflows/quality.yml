name: Quality

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  SOURCE_DATE_EPOCH: "0"

jobs:
  compiler-and-code:
    name: Compiler and code quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Verify formatting
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Run tests with enforced compiler coverage
        run: npm run test:coverage
      - name: Verify deterministic compilation
        run: npm run compile:verify

  static-build:
    name: Static production build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Build static release artifact
        run: npm run build:static

  dependency-audit:
    name: High-severity dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Audit production and development dependencies
        run: npm run audit:dependencies

  browser-accessibility:
    name: Playwright and axe
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Install pinned Chromium runtime
        run: npx --no-install playwright install --with-deps chromium
      - name: Run end-to-end and axe tests
        run: npm run test:e2e
